<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Earthquake Viewer</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>

    <div class="container">

        <header>
            <div class="header-title">
                <h1>🌎 Earthquake Viewer JP</h1>
                <p>日本の地震情報を最新の47件表示しています</p>
            </div>

            <div class="header-info">
                <div class="info-block">
                    <span class="info-title">⏱️ 現在時刻</span>
                    <span id="current-date">----/--/--</span>
                    <span id="current-time">--:--:--</span>
                </div>
                <div class="info-block">
                    <span class="info-title">🔄 最終更新</span>
                    <span id="last-update-date">----/--/--</span>
                    <span id="last-update-time">--:--:--</span>
                </div>
            </div>
        </header>

        <section id="status-bar">
            🟢 現在、大きな地震情報はありません
        </section>

        <div class="app-body">

            <div class="app-left">
                <section id="map-section">
                    <div id="map"></div>
                </section>

                <section id="mode-select">
                    <button id="refresh-button">
                        🔄 最新情報に更新
                    </button>
                </section>
            </div>

            <div class="app-right">
                <section id="earthquake-list">
                    </section>
            </div>

        </div></div><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/map.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
